name: Deploy Mini Java App

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Compile sources
        run: |
          mkdir -p out
          javac --release 11 -d out src/main/java/com/mlock/dni/*.java

      - name: Package executable JAR
        run: |
          mkdir -p dist
          jar --create --file dist/dni-authenticator.jar --main-class com.mlock.dni.Main -C out .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: dni-authenticator-jar
          path: dist/dni-authenticator.jar
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release and upload JAR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dni-authenticator.jar
          generate_release_notes: true
